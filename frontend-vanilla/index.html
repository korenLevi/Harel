<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
   



   
    <div class="create-ticket-container">
       <h1>User Tickets</h1>
      <form id="create-ticket-form">
        <input type="text" name="title" placeholder="Title" />
        <input type="text" name="description" placeholder="Description" />
      <select name="priority" id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
      <input
        type="text"
        name="assigned_user_id"
        placeholder="Assigned User ID"
      />
      <select name="status" id="status">
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="closed">Closed</option>
      </select>
      <button type="submit">Create Ticket</button>
    </form>

    <div>

      <div class="filter-container">
        <select name="status" id="status_filter" placeholder="Status" autocomplete="off">
          <option value="" >Select Status</option>

          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="closed">Closed</option>
        </select> 
        <select name="priority" id="priority_filter" placeholder="Priority">
          <option value="" >Select Priority</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <input
          type="text"
          name="assigned_user_id"
          id="assigned_user_id_filter"
          placeholder="Assigned User ID"
        />
        <button type="button" id="filter-tickets">Filter</button>
      </div>
      </div>

      <div class="table-container">
      <button id="save-table-changes" type="button" hidden>Save changes</button>

        <table class="table">
          <thead class="table-header">
            <tr>
              <th>Title</th>
              <th>Description</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Assigned User</th>
            </tr>
          </thead>
          <tbody class="table-body"></tbody>
        </table>
      </div>
    </div>
  </body>
</div>
  <script>
    // Optional override for deployments; default is http://localhost:8000/api
    globalThis.API_BASE = globalThis.API_BASE || "http://localhost:8000/api";
  </script>
  <script type="module" src="./index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
</html>
